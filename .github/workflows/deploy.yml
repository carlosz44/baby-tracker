name: CI/CD Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: babytracker_test
          POSTGRES_USER: baby
          POSTGRES_PASSWORD: baby
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U baby -d babytracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: test-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      ALLOWED_LOGIN_EMAILS: test@example.com
      DATABASE_URL: postgres://baby:baby@localhost:5432/babytracker_test
      DJANGO_SETTINGS_MODULE: config.settings.local

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements/local.txt

      - name: Install dependencies
        run: pip install -r requirements/local.txt

      - name: Run tests
        run: pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
      ALLOWED_LOGIN_EMAILS: ${{ secrets.ALLOWED_LOGIN_EMAILS }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_STORAGE_BUCKET_NAME: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
      AWS_S3_ENDPOINT_URL: ${{ secrets.AWS_S3_ENDPOINT_URL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v5

      - name: Build Tailwind CSS
        run: |
          curl -sSL https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 -o tailwindcss
          chmod +x tailwindcss
          ./tailwindcss -i static/css/input.css -o static/css/output.css --minify

      - name: Copy Tailwind output to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "static/css/output.css"
          target: "/var/www/baby-tracker/static/css/"
          strip_components: 2

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SECRET_KEY,ALLOWED_HOSTS,ALLOWED_LOGIN_EMAILS,DATABASE_URL,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_STORAGE_BUCKET_NAME,AWS_S3_ENDPOINT_URL,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            cd /var/www/baby-tracker
            git pull origin main
            umask 077
            cat > .env <<EOF
            SECRET_KEY=$SECRET_KEY
            DEBUG=False
            ALLOWED_HOSTS=$ALLOWED_HOSTS
            ALLOWED_LOGIN_EMAILS=$ALLOWED_LOGIN_EMAILS
            DATABASE_URL=$DATABASE_URL
            AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
            AWS_STORAGE_BUCKET_NAME=$AWS_STORAGE_BUCKET_NAME
            AWS_S3_ENDPOINT_URL=$AWS_S3_ENDPOINT_URL
            AWS_S3_REGION_NAME=auto
            GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            DJANGO_SETTINGS_MODULE=config.settings.production
            EOF
            source venv/bin/activate
            set -a
            source .env
            set +a
            pip install -r requirements/production.txt --quiet
            python manage.py migrate --no-input
            touch static/css/output.css
            python manage.py collectstatic --no-input --clear --ignore="input.css"
            sudo systemctl restart gunicorn-baby-tracker
