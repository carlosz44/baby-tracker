{% extends "base.html" %}

{% block title %}Access Denied — Baby Tracker{% endblock %}
{% block header %}Access Denied{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-20">
  <div class="bg-white dark:bg-slate-800 rounded-xl p-10 border border-slate-200 dark:border-slate-700 shadow-sm text-center max-w-md">
    <p class="text-5xl mb-4">🚫</p>
    <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 mb-2">Access Denied</h2>
    <p class="text-slate-500 dark:text-slate-400 mb-6">
      This app is private. Your Google account is not on the allowed list.
    </p>
    <a href="/accounts/login/"

      Try another account
    </a>
  </div>
</div>
{% endblock %}
