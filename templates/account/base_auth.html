{% load static %}
<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Baby Tracker{% endblock %}</title>

  <script>
    (function() {
      var theme = localStorage.getItem('theme');
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-700 dark:text-slate-200 min-h-screen flex items-center justify-center">
  {% block content %}{% endblock %}
</body>
</html>
