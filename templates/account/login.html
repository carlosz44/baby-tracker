{% extends "account/base_auth.html" %}

{% block title %}Iniciar Sesión — Baby Tracker{% endblock %}

{% block content %}
<div class="w-full max-w-sm mx-4">
  <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-8 text-center">
    <span class="text-4xl mb-4 block">🍼</span>
    <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 mb-2">Baby Tracker</h2>
    <p class="text-sm text-slate-500 dark:text-slate-400 mb-8">Inicia sesión para continuar</p>

    <a href="{% url 'google_login' %}"
       class="inline-flex items-center justify-center gap-3 w-full bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 font-medium py-3 px-4 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 transition">
      <svg class="w-5 h-5" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Iniciar sesión con Google
    </a>

    {% if debug %}
    <div class="mt-6 pt-6 border-t border-slate-200 dark:border-slate-700">
      <p class="text-xs text-slate-400 dark:text-slate-500 mb-4">Acceso de desarrollo</p>
      <form method="post" action="{% url 'dev_login' %}" class="space-y-3 text-left">
        {% csrf_token %}
        <div>
          <input type="email" name="email" placeholder="Correo electrónico" required
                 class="w-full px-3 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-rose-500">
        </div>
        <div>
          <input type="password" name="password" placeholder="Contraseña" required
                 class="w-full px-3 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-700 dark:text-slate-200 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-rose-500">
        </div>
        <button type="submit"
                class="w-full bg-slate-600 hover:bg-slate-700 text-white text-sm font-medium py-2 px-4 rounded-lg transition">
          Entrar (dev)
        </button>
      </form>
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
